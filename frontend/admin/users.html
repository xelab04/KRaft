<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRaft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
</head>
<body class="bg-black h-screen w-screen flex flex-col items-center justify-center m-0 p-0"
      x-data="userManager()">
    <div class="p-8 rounded-md shadow-lg max-w-2xl w-full mx-4 outline-white-500 h-[60vh]">
        <div class="flex items-center mb-4">
            <a href="/admin"><h1 class="text-white font-mono text-3xl">KRaft</h1></a>
            <h3 class="text-white font-mono text-sm ml-2 self-end mb-1">Admin View</h3>
        </div>
        <div class="flex items-center mb-4">
            <h3 class="text-white font-mono text-sm ml-2 self-end mb-1">by Alex</h3>
        </div>
        <div class="text-white font-mono flex flex-col mt-8">
            <a href="#" class="text-2xl underline block mt-6">[&gt;] View Users</a>
        </div>

        <table class="w-full table-fixed text-white font-mono mt-8">
            <thead>
                <tr>
                    <th class="px-4 py-2 border border-gray-500" colspan="1">Username</th>
                    <th class="px-4 py-2 border border-gray-500" colspan="2">Email</th>
                    <th class="px-4 py-2 border border-gray-500" colspan="1">Betacode</th>
                    <th class="px-4 py-2 border border-gray-500" colspan="1"></th>
                </tr>
            </thead>

            <tbody>
                <template x-for="user in users" :key="user.uuid">
                    <tr>
                        <td class="px-4 py-2 border border-gray-500" x-text="user.username" colspan="1"></td>
                        <td class="px-4 py-2 border border-gray-500 text-black hover:text-white" x-text="user.email" colspan="2"></td>
                        <td class="px-4 py-2 border border-gray-500" x-text="user.betacode" colspan="1"></td>
                        <td class="px-4 py-2 border border-gray-500">
                            <button class="hover:bg-gray-500 underline" @click="toggleViewUser(user)">
                                Expand
                            </button>
                        </td>
                    </tr>
                </template>

                <!-- Show non-existent loading -->
                <tr x-show="loading">
                    <td colspan="3" class="px-4 py-2 border border-gray-500 text-center">
                        Loading users...
                    </td>
                </tr>

                <!-- No clusters? -->
                <tr x-show="!loading && users.length === 0">
                    <td colspan="3" class="px-4 py-2 border border-gray-500 text-center">
                        No users found, this does not seem possible
                    </td>
                </tr>

                <!--
                <tr>
                    <td colspan="3" class="px-4 py-2 border border-gray-500 text-center">
                        <input
                            class="text-gray-800"
                            type="text"
                            id="betacode"
                            name="betacode"
                        />
                    </td>
                    <td class="px-4 py-2 border border-gray-500">
                        <button class="hover:bg-gray-500 underline" @click="createBetacode()">
                            Submit
                        </button>
                    </td>
                </tr>
                -->
            </tbody>

        </table>

        <div class="text-lg text-white mt-8" x-show="viewUser">
            <div class="text-xl block font-mono flex flex-col mt-8">User</div>
            <div class="px-6" x-text="viewUser.username"></div>

            <table class="table-fixed text-white font-mono mt-8">
                <thead>
                    <tr>
                        <th class="px-4 py-2 border border-gray-500">Cluster</th>
                        <th class="px-4 py-2 border border-gray-500">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <template x-for="cluster in viewUser.clusters" :key="cluster.id">
                        <tr>
                            <td class="px-4 py-2 border border-gray-500" x-text="cluster.name"></td>
                            <td class="px-4 py-2 border border-gray-500">
                                <button class="hover:bg-gray-500 underline" @click="toggleViewCluster(cluster)">
                                    Expand
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>

            </table>
        </div>

        <div class="text-lg text-white" x-show="viewCluster">
            <div class="text-xl block font-mono flex flex-col mt-8">Cluster Name</div>
            <div class="px-6" x-text="viewCluster.name">
            </div>
            <div class="text-xl block font-mono flex flex-col mt-4">API Server Endpoint</div>
            <div class="px-6" x-text="viewCluster.endpoint">
            </div>

            <div class="text-xl block font-mono flex flex-col mt-4">Kubeconfig</div>
            <button class="hover:bg-gray-500 underline px-6" @click="kubeconfig(viewCluster.name)">
                Download
            </button>

            <div class="text-xl block font-mono flex flex-col mt-4">Workspace</div>
            <button class="hover:bg-gray-500 underline px-6" @click="workspace(viewCluster.name, viewCluster.id)">
                Load Workspace
            </button>

            <div class="text-xl block font-mono flex flex-col mt-4">Delete Cluster</div>
            <button class="hover:bg-gray-500 underline px-6" @click="clusterdelete(viewCluster.name)">
                Delete
            </button>

            <div class="text-xl block font-mono flex flex-col mt-4">Cluster Logs</div>
            <button class="hover:bg-gray-500 underline px-6" @click="getLogs(viewCluster.name, 'server')">
                Server
            </button>
            <button class="hover:bg-gray-500 underline px-6" @click="getLogs(viewCluster.name, 'agent')">
                Agents
            </button>

            <button class="hover:bg-gray-500 underline px-6 text-md" @click="getLogs(viewCluster.name, null)" x-show="logType">
                refresh
            </button>

            <button class="hover:bg-gray-500 underline px-6 text-md" @click="copyLogs()" x-show="logType">
                copy
            </button>

            <div class="mb-8 py-8">
                <div
                class="text-sm bg-gray-900 text-gray-100 font-mono p-3 rounded-md w-full max-w-4xl h-64 overflow-y-auto whitespace-pre-wrap"
                x-show="clusterLogs"
                x-text="clusterLogs"
                ></div>
            </div>
        </div>


        <div class="text-2xl bg-red-300 font-mono mt-8 text-center" id="error-message">
            <!-- will be filled with error message -->
        </div>

    </div>


    <!-- 88x31 image at the bottom -->
    <div class="absolute bottom-4 hidden">
        <img src="assets/88x31.gif" alt="88x31 banner" width="88" height="31" />
    </div>

    <script>
        function userManager() {
            return {
                users: [],
                clusters: [],
                loading: true,
                error: null,
                viewUser: null,
                viewCluster: null,

                adminCheck() {
                  fetch("/auth/validate-admin", {
                    method: "GET",
                  })
                  .then((response) => {
                    console.log("response");
                    if (response.status === 401 || response.status === 403) {
                      window.location.href = `/sub/login`;
                    } else if (response.status === 200) {
                      return true;                    }
                  })
                  .catch((error) => {
                    console.log(error);
                    console.log("not supposed to reach here");
                  });
                },

                async getUsers() {
                    try {
                        this.loading = true;
                        const response = await fetch('/auth/user/list');

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        // for each user, now fetch their clusters and add to their struct

                        await Promise.all(
                            data.map(async (user) => {
                                const clusterResponse = await fetch(`/api/admin/get/clusters/${user.uuid}`);
                                if (!clusterResponse.ok) {
                                    throw new Error(`HTTP error! status: ${clusterResponse.status}`);
                                }
                                user.clusters = await clusterResponse.json();
                            })
                        );

                        this.users = data;
                        this.error = null;
                    } catch (error) {
                        console.error('Error fetching clusters:', error);
                        this.error = error.message;
                    } finally {
                        this.loading = false;
                    }
                },

                async toggleViewUser(currentUser) {
                  // clear cluster view when user changes
                  this.viewCluster = null;
                  if (this.viewUser == null) {
                    this.viewUser = currentUser;
                    return;
                  } else if (currentUser.uuid === this.viewUser.uuid) {
                    this.viewUser = null;
                    // if clicking on the same button
                  } else {
                    this.viewUser = currentUser;
                  }
                },

                toggleViewCluster(currentCluster) {
                  if (this.viewCluster == null) {
                    this.viewCluster = currentCluster;
                    return;
                  } else if (currentCluster.id === this.viewCluster.id) {
                    this.viewCluster = null;
                    // if clicking on the same button
                  } else {
                    this.viewCluster = currentCluster;
                  }
                },

                copyLogs() {
                  navigator.clipboard.writeText(this.clusterLogs);
                },

                async getLogs(clusterName, logType) {
                  if (logType == null) {
                    logType = this.logType;
                    if (logType == null) { return; }
                  } else {
                    this.logType = logType;
                  }

                  try {
                      const response = await fetch(`/api/logs?logtype=${logType}&full_cluster_name=${clusterName}`, {
                        method: "GET",
                      });

                      if (!response.ok) {
                          throw new Error(`status: ${response.status}`);
                      }

                      const data = await response.json();

                      console.log(data);

                      const separator = '\n\n' + '#'.repeat(10) + '\n\n';

                      this.clusterLogs = data.logs.join(separator);
                  } catch (error) {
                      console.error('Error fetching logs:', error);
                  }
                },

                init() {
                  this.adminCheck()
                  this.getUsers();
                }
            }
        }
    </script>
</body>
</html>
