<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRaft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    function adminCheck() {
        fetch("/auth/validate-admin", {
            method: "GET",
        })
          .then((response) => {
            if (response.status === 401 || response.status === 403) {
              // document.getElementById("error-message").textContent = "Access denied. Admins only.";
              window.location.href = `/sub/login`;
              return null;
            }
            return response.json();
          })
          .then((data) => {
            if (!data) return;

            console.log("Data:", data);
            if (data.status == "error") {
                document.getElementById(
                    "error-message",
                ).textContent = data.message;
                // redirect to login page
                window.location.href = `/sub/login`;
            } else {
                // document.getElementById('error-message').textContent = 'Success!';
                return true;
            }
          })
          .catch((error) => {
            console.log("not supposed to reach here");
            // document.getElementById("error-message").textContent =
            //     "An error occurred somewhere between here and the server.";
          });
    }

    adminCheck();
    </script>

</head>
<body class="bg-black h-screen w-screen flex flex-col items-center justify-center m-0 p-0">
    <div class=" p-8 rounded-md shadow-lg max-w-2xl w-full mx-4 h-[60vh]">
        <!-- bg-zinc-800 outline-white-500 outline -->
        <div class="flex items-center mb-4">
            <h1 class="text-white font-mono text-3xl">KRaft</h1>
            <h3 class="text-white font-mono text-sm ml-2 self-end mb-1">Admin View</h3>
        </div>
        <div class="flex items-center mb-4">
            <h3 class="text-white font-mono text-sm ml-2 self-end mb-1">by Alex</h3>
        </div>
        <div class="text-white font-mono flex flex-col mt-8">
            <a href="./admin/betacode" class="text-2xl underline block">[&gt;] Betacodes</a>
            <a href="./admin/users" class="text-2xl underline block mt-6">[&gt;] Users</a>
            <a href="./admin/clusters" class="text-2xl underline block mt-6">[&gt;] Clusters</a>
            <a href="./admin/workspaces" class="text-2xl underline block mt-6">[&gt;] Workspaces</a>
        </div>
    </div>

    <!-- 88x31 image at the bottom -->
    <div class="absolute bottom-4">
        <img src="assets/88x31.gif" alt="88x31 banner" width="88" height="31" />
    </div>
</body>
</html>
