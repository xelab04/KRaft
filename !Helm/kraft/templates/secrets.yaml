{{- $existing := (lookup "v1" "Secret" .Release.Namespace "jwtsecret") }}
apiVersion: v1
data:
  # JWT_SECRET: {{.Values.jwtSecret | b64enc | quote}}
  JWT_SECRET: {{ (default (randAlphaNum 32) (index $existing.data "JWT_SECRET" | b64dec)) | b64enc | quote }}
kind: Secret
metadata:
  creationTimestamp: null
  name: jwtsecret

---

{{- if  .Values.ntfy.enabled }}
apiVersion: v1
data:
  NTFY_URL: {{.Values.ntfy.url | b64enc | quote}}
  NTFY_TOPIC: {{.Values.ntfy.topic | b64enc | quote}}
  NTFY_BASIC_AUTH: {{.Values.ntfy.basicAuth | b64enc | quote}}
  NTFY_TOKEN: {{.Values.ntfy.token | b64enc | quote}}

kind: Secret
metadata:
  creationTimestamp: null
  name: ntfysecret
{{- end }}

---

apiVersion: v1
data:
  DB_DATABASE: {{.Values.database.database | b64enc | quote}}
  DB_HOST: {{.Values.database.host | b64enc | quote}}
  DB_PASSWORD: {{.Values.database.password | b64enc | quote}}
  DB_ROOT_PASSWORD: {{.Values.database.rootPassword | b64enc | quote}}
  DB_PORT: {{.Values.database.port | b64enc | quote}}
  DB_USER: {{.Values.database.user | b64enc | quote}}
kind: Secret
metadata:
  creationTimestamp: null
  name: database-secrets
