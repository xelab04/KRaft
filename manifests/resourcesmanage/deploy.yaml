apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: kraft-resource-manage
    project: kraft
  name: kraft-resource-manage
spec:
  replicas: 0
  selector:
    matchLabels:
      app: kraft-resource-manage
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: kraft-resource-manage
    spec:
      serviceAccountName: kraftsa
      automountServiceAccountToken: true
      containers:
      - image: registry.alexbissessur.dev/kraft-resource-manage:latest
        name: kraft-resource-manage
        ports:
        - containerPort: 5000
        resources: {}

      #   volumeMounts:
      #   - name: kubeconfig-volume
      #     mountPath: /root/.kube/
      # volumes:
      # - name: kubeconfig-volume
      #   secret:
      #     secretName: kubeconfig
status: {}

